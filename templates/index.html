<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHALVI — AI Assistant</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --card: #1a1a2e;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --text: #e0e0e0;
            --text-dim: #888;
            --user-bg: #2a2a4a;
            --ai-bg: #1a1a2e;
            --border: #2a2a3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 16px; color: white;
            box-shadow: 0 0 20px var(--accent-glow);
            animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50% { box-shadow: 0 0 35px var(--accent-glow), 0 0 60px rgba(108,99,255,0.15); }
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header h1 span { color: var(--accent); }
        .status { font-size: 12px; color: var(--text-dim); }
        .status::before { content: '●'; color: #4ade80; margin-right: 6px; }
        .btn-clear {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-dim); padding: 8px 16px; border-radius: 8px;
            cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .btn-clear:hover { border-color: var(--accent); color: var(--text); }

        /* Wake word indicator */
        .wake-controls { display: flex; align-items: center; gap: 10px; }
        .wake-toggle {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text-dim); padding: 8px 14px; border-radius: 8px;
            cursor: pointer; font-size: 12px; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .wake-toggle:hover { border-color: var(--accent); color: var(--text); }
        .wake-toggle.active { border-color: #4ade80; color: #4ade80; }
        .wake-toggle .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--text-dim); transition: all 0.2s;
        }
        .wake-toggle.active .dot { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.5); }
        .wake-status {
            font-size: 11px; color: var(--text-dim);
            min-width: 100px; text-align: center;
        }
        .wake-status.heard { color: var(--accent); font-weight: 600; animation: wake-flash 0.5s ease; }
        @keyframes wake-flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            animation: msg-in 0.3s ease;
        }
        @keyframes msg-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: var(--user-bg);
            border-bottom-right-radius: 4px;
        }
        .message.ai {
            align-self: flex-start;
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .message.ai .name { color: var(--accent); font-weight: 600; font-size: 12px; margin-bottom: 6px; }

        .typing-indicator {
            align-self: flex-start;
            padding: 14px 18px;
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: none;
        }
        .typing-indicator.show { display: flex; gap: 4px; align-items: center; }
        .typing-indicator span {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent); opacity: 0.4;
            animation: blink 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Welcome */
        .welcome {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 12px; opacity: 0.7;
        }
        .welcome h2 { font-size: 28px; }
        .welcome p { color: var(--text-dim); font-size: 15px; }

        /* Input Area */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area input:focus { border-color: var(--accent); }
        .input-area input::placeholder { color: var(--text-dim); }

        .btn-mic, .btn-send {
            width: 48px; height: 48px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .btn-send {
            background: var(--accent);
            color: white;
        }
        .btn-send:hover { filter: brightness(1.15); }
        .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-mic {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-mic:hover { border-color: var(--accent); }
        .btn-mic.recording {
            background: #ff4444;
            border-color: #ff4444;
            color: white;
            animation: pulse-rec 1s infinite;
        }
        @keyframes pulse-rec {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(255,68,68,0); }
        }

        /* SVG Icons inline */
        .icon { width: 20px; height: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">S</div>
            <div>
                <h1><span>SHALVI</span></h1>
                <div class="status">Online — ready for you, Aniket</div>
            </div>
        </div>
        <div class="wake-controls">
            <div class="wake-status" id="wakeStatus"></div>
            <button class="wake-toggle" id="wakeToggle" onclick="toggleWakeWord()" title="Wake word: say 'Shalvi'">
                <span class="dot"></span> Wake Word
            </button>
            <button class="btn-clear" onclick="clearChat()">Clear Chat</button>
        </div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcome">
            <div class="logo" style="width:64px;height:64px;font-size:24px;">S</div>
            <h2>Hey Aniket 👋</h2>
            <p>I'm Shalvi, your personalised friend's replica. Talk to me or type below.</p>
        </div>
    </div>

    <div class="typing-indicator" id="typing">
        <span></span><span></span><span></span>
    </div>

    <div class="input-area">
        <button class="btn-mic" id="micBtn" onclick="toggleMic()" title="Push to talk">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
        <input type="text" id="msgInput" placeholder="Talk to Shalvi..." autocomplete="off" />
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const msgInput = document.getElementById('msgInput');
        const typing = document.getElementById('typing');
        const welcome = document.getElementById('welcome');
        const micBtn = document.getElementById('micBtn');
        const wakeToggle = document.getElementById('wakeToggle');
        const wakeStatus = document.getElementById('wakeStatus');
        let isRecording = false;
        let currentAudio = null;
        let isSending = false;

        // ─── Deepgram STT Engine ───────────────────────────────
        let deepgramKey = null;
        let mediaRecorder = null;
        let dgSocket = null;
        let micStream = null;

        // Wake word state
        let wakeWordActive = false;
        let wakeTriggered = false;
        let dgMode = 'idle'; // 'idle' | 'wake' | 'command' | 'session'
        let inSession = false; // true = conversation active, no need to say wake word
        let sessionSilenceTimer = null;
        const SESSION_TIMEOUT = 30000; // 30s silence → back to wake mode

        const WAKE_PHRASES = ['shalvi', 'shelby', 'shelvie', 'chalvi', 'sharvi', 'salvi', 'shelvi', 'charlie', 'talvi', 'shulvi', 'sylvie', 'selvie', 'chalbi', 'shalbi', 'shilvi', 'shilpi', 'salbi', 'shelbi', 'shall we', 'shall v', 'chelvie', 'thalvi', 'jhalvi', 'zalvi'];

        // Levenshtein for fuzzy matching
        function levenshtein(a, b) {
            const m = a.length, n = b.length;
            const dp = Array(m + 1).fill(0).map(() => Array(n + 1).fill(0));
            for (let i = 0; i <= m; i++) dp[i][0] = i;
            for (let j = 0; j <= n; j++) dp[0][j] = j;
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
            return dp[m][n];
        }

        function detectWakeWord(transcript) {
            const text = transcript.toLowerCase().trim();
            for (const w of WAKE_PHRASES) {
                const idx = text.indexOf(w);
                if (idx !== -1) {
                    return { detected: true, command: text.slice(idx + w.length).trim() };
                }
            }
            // Fuzzy match
            for (const word of text.split(/\s+/)) {
                if (word.length > 3) {
                    for (const phrase of WAKE_PHRASES) {
                        const sim = 1 - (levenshtein(word, phrase) / Math.max(word.length, phrase.length));
                        if (sim > 0.55) {
                            console.log(`[WAKE] fuzzy: "${word}" ≈ "${phrase}" (${(sim*100).toFixed(0)}%)`);
                            const idx = text.indexOf(word);
                            return { detected: true, command: text.slice(idx + word.length).trim() };
                        }
                    }
                }
            }
            return { detected: false, command: '' };
        }

        async function getDeepgramKey() {
            if (deepgramKey) return deepgramKey;
            const res = await fetch('/api/deepgram-key');
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            deepgramKey = data.key;
            return deepgramKey;
        }

        async function getMicStream() {
            if (micStream) return micStream;
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            return micStream;
        }

        function startDeepgramStream(mode) {
            // mode: 'wake' or 'command'
            dgMode = mode;
            console.log(`[DG] Starting stream in ${mode} mode`);

            const key = deepgramKey;
            const url = 'wss://api.deepgram.com/v1/listen?' + new URLSearchParams({
                model: 'nova-2',
                language: 'en-IN',
                smart_format: 'true',
                interim_results: 'true',
                utterance_end_ms: '1500',
                vad_events: 'true',
                endpointing: mode === 'command' ? '2500' : '300',
            }).toString();

            dgSocket = new WebSocket(url, ['token', key]);

            let commandText = '';
            let commandSilenceTimer = null;
            let wakeDebounce = null;

            dgSocket.onopen = () => {
                console.log(`[DG] WebSocket open (${mode})`);
                if (mode === 'wake') {
                    wakeStatus.textContent = '🎤 Listening for "Shalvi"';
                    wakeTriggered = false;
                }

                // Start sending audio
                mediaRecorder = new MediaRecorder(micStream, { mimeType: 'audio/webm' });
                mediaRecorder.ondataavailable = (e) => {
                    if (dgSocket && dgSocket.readyState === WebSocket.OPEN && e.data.size > 0) {
                        dgSocket.send(e.data);
                    }
                };
                mediaRecorder.start(250); // send chunks every 250ms
            };

            dgSocket.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === 'Results') {
                    const transcript = msg.channel?.alternatives?.[0]?.transcript || '';
                    const isFinal = msg.is_final;

                    if (!transcript) return;

                    console.log(`[DG ${mode}] ${isFinal ? 'FINAL' : 'interim'}: "${transcript}"`);

                    if (mode === 'wake') {
                        // Show what we hear
                        wakeStatus.textContent = '👂 "' + transcript.substring(0, 30) + '"';

                        const { detected, command } = detectWakeWord(transcript);
                        if (detected && !wakeTriggered) {
                            if (isFinal) {
                                if (wakeDebounce) clearTimeout(wakeDebounce);
                                wakeTriggered = true;
                                onWakeWordDetected(command);
                            } else {
                                wakeStatus.textContent = '🎯 Heard "Shalvi"!';
                                wakeStatus.className = 'wake-status heard';
                                if (wakeDebounce) clearTimeout(wakeDebounce);
                                const cmd = command;
                                wakeDebounce = setTimeout(() => {
                                    if (!wakeTriggered) {
                                        wakeTriggered = true;
                                        onWakeWordDetected(cmd);
                                    }
                                }, 500);
                            }
                        }
                    } else if (mode === 'command') {
                        if (isFinal) {
                            commandText += (commandText ? ' ' : '') + transcript;
                            msgInput.value = commandText;
                        } else {
                            msgInput.value = commandText + (commandText ? ' ' : '') + transcript;
                        }
                        wakeStatus.textContent = '🟢 Listening...';

                        // Reset silence timer
                        if (commandSilenceTimer) clearTimeout(commandSilenceTimer);
                        commandSilenceTimer = setTimeout(() => {
                            finishCommandCapture(commandText || msgInput.value.trim());
                        }, 2500);
                    }
                }

                // Utterance end = user stopped talking
                if (msg.type === 'UtteranceEnd' && mode === 'command') {
                    const text = commandText || msgInput.value.trim();
                    if (text) {
                        if (commandSilenceTimer) clearTimeout(commandSilenceTimer);
                        finishCommandCapture(text);
                    }
                }
            };

            dgSocket.onerror = (e) => {
                console.log('[DG] WebSocket error:', e);
                wakeStatus.textContent = '❌ Connection error';
            };

            dgSocket.onclose = () => {
                console.log(`[DG] WebSocket closed (${mode})`);
                if (mode === 'wake' && wakeWordActive && !wakeTriggered) {
                    // Auto-reconnect for wake mode
                    setTimeout(() => {
                        if (wakeWordActive && !wakeTriggered) {
                            console.log('[DG] Reconnecting wake listener...');
                            startDeepgramStream('wake');
                        }
                    }, 500);
                }
            };
        }

        function stopDeepgramStream() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                try { mediaRecorder.stop(); } catch(e) {}
            }
            if (dgSocket && dgSocket.readyState === WebSocket.OPEN) {
                // Send close message to Deepgram
                dgSocket.send(JSON.stringify({ type: 'CloseStream' }));
                dgSocket.close();
            }
            dgSocket = null;
            mediaRecorder = null;
        }

        function onWakeWordDetected(immediateCommand) {
            console.log('[WAKE] Detected! Command:', immediateCommand);
            stopDeepgramStream();
            playActivationBeep();
            enterSession();

            wakeStatus.textContent = '🟢 Listening...';
            wakeStatus.className = 'wake-status heard';

            if (immediateCommand && immediateCommand.length > 2) {
                msgInput.value = immediateCommand;
                sendMessage();
            } else {
                // Start command capture
                startSessionListening();
            }
        }

        function enterSession() {
            inSession = true;
            resetSessionTimeout();
            console.log('[SESSION] Conversation session started');
        }

        function resetSessionTimeout() {
            if (sessionSilenceTimer) clearTimeout(sessionSilenceTimer);
            sessionSilenceTimer = setTimeout(() => {
                console.log('[SESSION] 30s silence — ending session');
                endSession();
            }, SESSION_TIMEOUT);
        }

        function endSession() {
            inSession = false;
            if (sessionSilenceTimer) clearTimeout(sessionSilenceTimer);
            sessionSilenceTimer = null;
            stopDeepgramStream();
            isRecording = false;
            micBtn.classList.remove('recording');
            console.log('[SESSION] Ended, back to wake word mode');
            restartWakeListener();
        }

        function startSessionListening() {
            // Listen for next command in conversation (no wake word needed)
            isRecording = true;
            micBtn.classList.add('recording');
            wakeStatus.textContent = '🟢 Listening...';
            startDeepgramStream('command');
        }

        function finishCommandCapture(text) {
            console.log('[CMD] Finishing with:', text);
            stopDeepgramStream();
            isRecording = false;
            micBtn.classList.remove('recording');
            if (text) {
                msgInput.value = text;
                sendMessage();
            } else if (inSession) {
                // No speech but still in session — keep listening
                resetSessionTimeout();
                startSessionListening();
            } else {
                restartWakeListener();
            }
        }

        function restartWakeListener() {
            if (!wakeWordActive) return;
            if (inSession) {
                // Still in session — go back to listening, not wake mode
                wakeStatus.textContent = '🟢 Listening...';
                wakeStatus.className = 'wake-status heard';
                startSessionListening();
                return;
            }
            wakeStatus.textContent = 'Listening for "Shalvi"';
            wakeStatus.className = 'wake-status';
            wakeTriggered = false;
            startDeepgramStream('wake');
        }

        async function toggleWakeWord() {
            wakeWordActive = !wakeWordActive;

            if (wakeWordActive) {
                try {
                    wakeStatus.textContent = '⏳ Connecting...';
                    await getDeepgramKey();
                    await getMicStream();
                    wakeToggle.classList.add('active');
                    startDeepgramStream('wake');
                } catch(e) {
                    wakeWordActive = false;
                    wakeStatus.textContent = '❌ ' + e.message;
                    console.error('[WAKE] Setup failed:', e);
                }
            } else {
                wakeToggle.classList.remove('active');
                wakeStatus.textContent = '';
                stopDeepgramStream();
            }
        }

        function playActivationBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                osc.frequency.setValueAtTime(1320, ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.2);
            } catch(e) {}
        }

        // ─── Manual Mic (Push-to-talk) ─────────────────────────
        async function toggleMic() {
            if (isRecording) {
                finishCommandCapture(msgInput.value.trim());
                return;
            }

            try {
                await getDeepgramKey();
                await getMicStream();
                // Pause wake listener
                if (wakeWordActive) stopDeepgramStream();
                if (currentAudio) { currentAudio.pause(); currentAudio = null; }
                isRecording = true;
                micBtn.classList.add('recording');
                startDeepgramStream('command');
            } catch(e) {
                alert('Mic error: ' + e.message);
            }
        }

        // ─── Chat Functions ────────────────────────────────────
        function addMessage(text, role) {
            if (welcome) welcome.style.display = 'none';
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'ai') {
                div.innerHTML = `<div class="name">SHALVI</div>${formatText(text)}`;
            } else {
                div.textContent = text;
            }
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function formatText(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.*?)`/g, '<code style="background:rgba(108,99,255,0.15);padding:2px 6px;border-radius:4px;">$1</code>')
                .replace(/\n/g, '<br>');
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || isSending) return;
            isSending = true;
            msgInput.value = '';
            addMessage(text, 'user');

            typing.classList.add('show');
            chatArea.appendChild(typing);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });
                const data = await res.json();
                typing.classList.remove('show');
                addMessage(data.reply, 'ai');

                if (data.has_audio && data.audio_url) {
                    if (currentAudio) { currentAudio.pause(); }
                    // Pause listening while Shalvi speaks
                    stopDeepgramStream();
                    isRecording = false;
                    micBtn.classList.remove('recording');
                    currentAudio = new Audio(data.audio_url);
                    currentAudio.onended = () => {
                        if (inSession) {
                            resetSessionTimeout();
                            startSessionListening();
                        } else {
                            restartWakeListener();
                        }
                    };
                    currentAudio.play().catch(() => {
                        if (inSession) {
                            resetSessionTimeout();
                            startSessionListening();
                        } else {
                            restartWakeListener();
                        }
                    });
                } else if (inSession) {
                    // No audio, but still in session — resume listening
                    resetSessionTimeout();
                    startSessionListening();
                }
            } catch (err) {
                typing.classList.remove('show');
                addMessage("Sorry Aniket, I'm not well can you please check my health.", 'ai');
            }
            isSending = false;
        }

        async function clearChat() {
            chatArea.innerHTML = '';
            if (welcome) { chatArea.appendChild(welcome); welcome.style.display = 'flex'; }
            await fetch('/api/clear', { method: 'POST' });
        }

        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        msgInput.focus();
    </script>
</body>
</html>
