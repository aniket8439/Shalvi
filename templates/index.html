<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHALVI — AI Assistant</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --card: #1a1a2e;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --text: #e0e0e0;
            --text-dim: #888;
            --user-bg: #2a2a4a;
            --ai-bg: #1a1a2e;
            --border: #2a2a3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 16px; color: white;
            box-shadow: 0 0 20px var(--accent-glow);
            animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50% { box-shadow: 0 0 35px var(--accent-glow), 0 0 60px rgba(108,99,255,0.15); }
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header h1 span { color: var(--accent); }
        .status { font-size: 12px; color: var(--text-dim); }
        .status::before { content: '●'; color: #4ade80; margin-right: 6px; }
        .btn-clear {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-dim); padding: 8px 16px; border-radius: 8px;
            cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .btn-clear:hover { border-color: var(--accent); color: var(--text); }

        /* Wake word indicator */
        .wake-controls { display: flex; align-items: center; gap: 10px; }
        .wake-toggle {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text-dim); padding: 8px 14px; border-radius: 8px;
            cursor: pointer; font-size: 12px; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .wake-toggle:hover { border-color: var(--accent); color: var(--text); }
        .wake-toggle.active { border-color: #4ade80; color: #4ade80; }
        .wake-toggle .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--text-dim); transition: all 0.2s;
        }
        .wake-toggle.active .dot { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.5); }
        .wake-status {
            font-size: 11px; color: var(--text-dim);
            min-width: 100px; text-align: center;
        }
        .wake-status.heard { color: var(--accent); font-weight: 600; animation: wake-flash 0.5s ease; }
        @keyframes wake-flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            animation: msg-in 0.3s ease;
        }
        @keyframes msg-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: var(--user-bg);
            border-bottom-right-radius: 4px;
        }
        .message.ai {
            align-self: flex-start;
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .message.ai .name { color: var(--accent); font-weight: 600; font-size: 12px; margin-bottom: 6px; }

        .typing-indicator {
            align-self: flex-start;
            padding: 14px 18px;
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: none;
        }
        .typing-indicator.show { display: flex; gap: 4px; align-items: center; }
        .typing-indicator span {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent); opacity: 0.4;
            animation: blink 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Welcome */
        .welcome {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 12px; opacity: 0.7;
        }
        .welcome h2 { font-size: 28px; }
        .welcome p { color: var(--text-dim); font-size: 15px; }

        /* Input Area */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area input:focus { border-color: var(--accent); }
        .input-area input::placeholder { color: var(--text-dim); }

        .btn-mic, .btn-send {
            width: 48px; height: 48px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .btn-send {
            background: var(--accent);
            color: white;
        }
        .btn-send:hover { filter: brightness(1.15); }
        .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-mic {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-mic:hover { border-color: var(--accent); }
        .btn-mic.recording {
            background: #ff4444;
            border-color: #ff4444;
            color: white;
            animation: pulse-rec 1s infinite;
        }
        @keyframes pulse-rec {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(255,68,68,0); }
        }

        /* SVG Icons inline */
        .icon { width: 20px; height: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">S</div>
            <div>
                <h1><span>SHALVI</span></h1>
                <div class="status">Online — ready for you, Aniket</div>
            </div>
        </div>
        <div class="wake-controls">
            <div class="wake-status" id="wakeStatus"></div>
            <button class="wake-toggle" id="wakeToggle" onclick="toggleWakeWord()" title="Wake word: say 'Shalvi'">
                <span class="dot"></span> Wake Word
            </button>
            <button class="btn-clear" onclick="clearChat()">Clear Chat</button>
        </div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcome">
            <div class="logo" style="width:64px;height:64px;font-size:24px;">S</div>
            <h2>Hey Aniket 👋</h2>
            <p>I'm Shalvi, your personal assistant. Talk to me or type below.</p>
        </div>
    </div>

    <div class="typing-indicator" id="typing">
        <span></span><span></span><span></span>
    </div>

    <div class="input-area">
        <button class="btn-mic" id="micBtn" onclick="toggleMic()" title="Push to talk">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
        <input type="text" id="msgInput" placeholder="Talk to Shalvi..." autocomplete="off" />
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const msgInput = document.getElementById('msgInput');
        const typing = document.getElementById('typing');
        const welcome = document.getElementById('welcome');
        const micBtn = document.getElementById('micBtn');
        const wakeToggle = document.getElementById('wakeToggle');
        const wakeStatus = document.getElementById('wakeStatus');
        let isRecording = false;
        let currentAudio = null;
        let isSending = false;

        // ─── Wake Word Detection ───────────────────────────────
        let wakeWordActive = false;
        let wakeRecognition = null;
        let commandRecognition = null;

        const WAKE_PHRASES = ['shalvi', 'shelby', 'shelvie', 'chalvi', 'sharvi', 'shaalvi', 'salvi', 'shelvi', 'shulvi', 'shall we', 'shall v', 'shal vi', 'shal we', 'shilvi', 'shilpi', 'shulbi', 'shelbi'];

        function detectWakeWord(transcript) {
            const text = transcript.toLowerCase().trim();
            // Log what Chrome hears so we can debug
            console.log('[SHALVI WAKE] heard:', text);
            for (const w of WAKE_PHRASES) {
                const idx = text.indexOf(w);
                if (idx !== -1) {
                    const command = text.slice(idx + w.length).trim();
                    return { detected: true, command };
                }
            }
            return { detected: false, command: '' };
        }

        function createRecognition() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return null;
            return new SR();
        }

        // Background listener — always on, listening for wake word
        function setupWakeListener() {
            wakeRecognition = createRecognition();
            if (!wakeRecognition) return;

            wakeRecognition.continuous = true;
            wakeRecognition.interimResults = true;
            wakeRecognition.lang = 'en-IN';

            let wakeDebounce = null;
            let alreadyTriggered = false;

            wakeRecognition.onresult = (e) => {
                if (alreadyTriggered) return;
                
                // Check ALL results, not just from resultIndex
                for (let i = 0; i < e.results.length; i++) {
                    const transcript = e.results[i][0].transcript;
                    const { detected, command } = detectWakeWord(transcript);
                    
                    if (detected) {
                        if (e.results[i].isFinal) {
                            if (wakeDebounce) clearTimeout(wakeDebounce);
                            alreadyTriggered = true;
                            onWakeWordDetected(command);
                            return;
                        } else {
                            wakeStatus.textContent = '🎯 Heard you...';
                            wakeStatus.className = 'wake-status heard';
                            if (wakeDebounce) clearTimeout(wakeDebounce);
                            wakeDebounce = setTimeout(() => {
                                alreadyTriggered = true;
                                onWakeWordDetected(command);
                            }, 600);
                        }
                    }
                }
            };

            wakeRecognition.onend = () => {
                // Auto-restart if wake word mode is still active
                if (wakeWordActive && !isRecording) {
                    setTimeout(() => {
                        try { wakeRecognition.start(); } catch(e) {}
                    }, 300);
                }
            };

            wakeRecognition.onerror = (e) => {
                if (e.error === 'not-allowed') {
                    wakeWordActive = false;
                    wakeToggle.classList.remove('active');
                    wakeStatus.textContent = 'Mic denied';
                    return;
                }
                // Auto-restart on other errors
                if (wakeWordActive) {
                    setTimeout(() => {
                        try { wakeRecognition.start(); } catch(e) {}
                    }, 1000);
                }
            };
        }

        function onWakeWordDetected(immediateCommand) {
            // Stop wake listener
            try { wakeRecognition.stop(); } catch(e) {}

            // Play a subtle activation sound via oscillator
            playActivationBeep();

            wakeStatus.textContent = '🟢 Listening...';
            wakeStatus.className = 'wake-status heard';

            if (immediateCommand && immediateCommand.length > 2) {
                // Wake word + command in one sentence: "Hey Shalvi what's the weather"
                msgInput.value = immediateCommand;
                sendMessage();
                // Restart wake listener after response
                setTimeout(() => restartWakeListener(), 1000);
            } else {
                // Just wake word — start command capture
                startCommandCapture();
            }
        }

        function startCommandCapture() {
            commandRecognition = createRecognition();
            if (!commandRecognition) return;

            commandRecognition.continuous = true;
            commandRecognition.interimResults = true;
            commandRecognition.lang = 'en-US';

            isRecording = true;
            micBtn.classList.add('recording');

            let finalTranscript = '';
            let silenceTimer = null;
            let lastSpeechTime = Date.now();
            const SILENCE_TIMEOUT = 2500; // 2.5s silence = done speaking

            function resetSilenceTimer() {
                lastSpeechTime = Date.now();
                if (silenceTimer) clearTimeout(silenceTimer);
                silenceTimer = setTimeout(() => {
                    // User has been silent — they're done
                    try { commandRecognition.stop(); } catch(e) {}
                }, SILENCE_TIMEOUT);
            }

            // Start the initial silence timer (if user says nothing for 5s after wake)
            let initialTimer = setTimeout(() => {
                if (!finalTranscript && !msgInput.value.trim()) {
                    try { commandRecognition.stop(); } catch(e) {}
                }
            }, 5000);

            commandRecognition.onresult = (e) => {
                clearTimeout(initialTimer);
                let interim = '';
                finalTranscript = '';
                for (let i = 0; i < e.results.length; i++) {
                    if (e.results[i].isFinal) {
                        finalTranscript += e.results[i][0].transcript;
                    } else {
                        interim += e.results[i][0].transcript;
                    }
                }
                msgInput.value = finalTranscript + interim;
                wakeStatus.textContent = '🟢 Listening...';

                // Reset silence timer on every new speech
                resetSilenceTimer();
            };

            commandRecognition.onspeechend = () => {
                // Browser detected speech ended — give a short grace period
                if (silenceTimer) clearTimeout(silenceTimer);
                silenceTimer = setTimeout(() => {
                    try { commandRecognition.stop(); } catch(e) {}
                }, 1500);
            };

            commandRecognition.onend = () => {
                if (silenceTimer) clearTimeout(silenceTimer);
                clearTimeout(initialTimer);
                isRecording = false;
                micBtn.classList.remove('recording');
                const text = msgInput.value.trim();
                if (text) {
                    sendMessage();
                }
                setTimeout(() => restartWakeListener(), 500);
            };

            commandRecognition.onerror = () => {
                if (silenceTimer) clearTimeout(silenceTimer);
                clearTimeout(initialTimer);
                isRecording = false;
                micBtn.classList.remove('recording');
                setTimeout(() => restartWakeListener(), 500);
            };

            commandRecognition.start();
        }

        function restartWakeListener() {
            if (!wakeWordActive) return;
            wakeStatus.textContent = 'Listening for "Shalvi"';
            wakeStatus.className = 'wake-status';
            // Re-create the wake listener to reset state
            setupWakeListener();
            try { wakeRecognition.start(); } catch(e) {}
        }

        function toggleWakeWord() {
            if (!createRecognition()) {
                alert('Speech recognition not supported. Use Chrome.');
                return;
            }

            wakeWordActive = !wakeWordActive;

            if (wakeWordActive) {
                if (!wakeRecognition) setupWakeListener();
                wakeToggle.classList.add('active');
                wakeStatus.textContent = 'Listening for "Shalvi"';
                try { wakeRecognition.start(); } catch(e) {}
            } else {
                wakeToggle.classList.remove('active');
                wakeStatus.textContent = '';
                try { wakeRecognition.stop(); } catch(e) {}
            }
        }

        function playActivationBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                osc.frequency.setValueAtTime(1320, ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.2);
            } catch(e) {}
        }

        // ─── Manual Mic (Push-to-talk) ─────────────────────────
        function toggleMic() {
            const sr = createRecognition();
            if (!sr) { alert('Speech recognition not supported. Use Chrome.'); return; }

            if (isRecording) {
                if (commandRecognition) commandRecognition.stop();
                return;
            }

            // Pause wake listener while manually recording
            if (wakeWordActive) {
                try { wakeRecognition.stop(); } catch(e) {}
            }
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            startCommandCapture();
        }

        // ─── Chat Functions ────────────────────────────────────
        function addMessage(text, role) {
            if (welcome) welcome.style.display = 'none';
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'ai') {
                div.innerHTML = `<div class="name">SHALVI</div>${formatText(text)}`;
            } else {
                div.textContent = text;
            }
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function formatText(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.*?)`/g, '<code style="background:rgba(108,99,255,0.15);padding:2px 6px;border-radius:4px;">$1</code>')
                .replace(/\n/g, '<br>');
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || isSending) return;
            isSending = true;
            msgInput.value = '';
            addMessage(text, 'user');

            typing.classList.add('show');
            chatArea.appendChild(typing);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });
                const data = await res.json();
                typing.classList.remove('show');
                addMessage(data.reply, 'ai');

                // Play audio — pause wake listener while Shalvi speaks
                if (data.has_audio && data.audio_url) {
                    if (currentAudio) { currentAudio.pause(); }
                    if (wakeWordActive) { try { wakeRecognition.stop(); } catch(e) {} }
                    currentAudio = new Audio(data.audio_url);
                    currentAudio.onended = () => { restartWakeListener(); };
                    currentAudio.play().catch(() => { restartWakeListener(); });
                }
            } catch (err) {
                typing.classList.remove('show');
                addMessage("Sorry Aniket, I'm not well can you please check my health.", 'ai');
            }
            isSending = false;
        }

        async function clearChat() {
            chatArea.innerHTML = '';
            if (welcome) { chatArea.appendChild(welcome); welcome.style.display = 'flex'; }
            await fetch('/api/clear', { method: 'POST' });
        }

        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        msgInput.focus();
    </script>
</body>
</html>
