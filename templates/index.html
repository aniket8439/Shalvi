<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHALVI — AI Assistant</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --card: #1a1a2e;
            --accent: #6c63ff;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --text: #e0e0e0;
            --text-dim: #888;
            --user-bg: #2a2a4a;
            --ai-bg: #1a1a2e;
            --border: #2a2a3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 16px; color: white;
            box-shadow: 0 0 20px var(--accent-glow);
            animation: pulse-glow 3s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50% { box-shadow: 0 0 35px var(--accent-glow), 0 0 60px rgba(108,99,255,0.15); }
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header h1 span { color: var(--accent); }
        .status { font-size: 12px; color: var(--text-dim); }
        .status::before { content: '●'; color: #4ade80; margin-right: 6px; }
        .btn-clear {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-dim); padding: 8px 16px; border-radius: 8px;
            cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .btn-clear:hover { border-color: var(--accent); color: var(--text); }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            animation: msg-in 0.3s ease;
        }
        @keyframes msg-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: var(--user-bg);
            border-bottom-right-radius: 4px;
        }
        .message.ai {
            align-self: flex-start;
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .message.ai .name { color: var(--accent); font-weight: 600; font-size: 12px; margin-bottom: 6px; }

        .typing-indicator {
            align-self: flex-start;
            padding: 14px 18px;
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: none;
        }
        .typing-indicator.show { display: flex; gap: 4px; align-items: center; }
        .typing-indicator span {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent); opacity: 0.4;
            animation: blink 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Welcome */
        .welcome {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 12px; opacity: 0.7;
        }
        .welcome h2 { font-size: 28px; }
        .welcome p { color: var(--text-dim); font-size: 15px; }

        /* Input Area */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-area input:focus { border-color: var(--accent); }
        .input-area input::placeholder { color: var(--text-dim); }

        .btn-mic, .btn-send {
            width: 48px; height: 48px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .btn-send {
            background: var(--accent);
            color: white;
        }
        .btn-send:hover { filter: brightness(1.15); }
        .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-mic {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-mic:hover { border-color: var(--accent); }
        .btn-mic.recording {
            background: #ff4444;
            border-color: #ff4444;
            color: white;
            animation: pulse-rec 1s infinite;
        }
        @keyframes pulse-rec {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(255,68,68,0); }
        }

        /* SVG Icons inline */
        .icon { width: 20px; height: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">S</div>
            <div>
                <h1><span>SHALVI</span></h1>
                <div class="status">Online — ready for you, Aniket</div>
            </div>
        </div>
        <button class="btn-clear" onclick="clearChat()">Clear Chat</button>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcome">
            <div class="logo" style="width:64px;height:64px;font-size:24px;">S</div>
            <h2>Hey Aniket 👋</h2>
            <p>I'm Shalvi, your personal assistant. Talk to me or type below.</p>
        </div>
    </div>

    <div class="typing-indicator" id="typing">
        <span></span><span></span><span></span>
    </div>

    <div class="input-area">
        <button class="btn-mic" id="micBtn" onclick="toggleMic()" title="Push to talk">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
        <input type="text" id="msgInput" placeholder="Talk to Shalvi..." autocomplete="off" />
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const msgInput = document.getElementById('msgInput');
        const typing = document.getElementById('typing');
        const welcome = document.getElementById('welcome');
        const micBtn = document.getElementById('micBtn');
        let isRecording = false;
        let recognition = null;
        let currentAudio = null;

        // Speech recognition setup
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                msgInput.value = text;
                sendMessage();
            };
            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove('recording');
            };
            recognition.onerror = () => {
                isRecording = false;
                micBtn.classList.remove('recording');
            };
        }

        function toggleMic() {
            if (!recognition) { alert('Speech recognition not supported in this browser. Use Chrome.'); return; }
            if (isRecording) {
                recognition.stop();
            } else {
                // Stop any playing audio
                if (currentAudio) { currentAudio.pause(); currentAudio = null; }
                recognition.start();
                isRecording = true;
                micBtn.classList.add('recording');
            }
        }

        function addMessage(text, role) {
            if (welcome) welcome.style.display = 'none';
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'ai') {
                div.innerHTML = `<div class="name">SHALVI</div>${formatText(text)}`;
            } else {
                div.textContent = text;
            }
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function formatText(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.*?)`/g, '<code style="background:rgba(108,99,255,0.15);padding:2px 6px;border-radius:4px;">$1</code>')
                .replace(/\n/g, '<br>');
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            msgInput.value = '';
            addMessage(text, 'user');

            typing.classList.add('show');
            chatArea.appendChild(typing);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });
                const data = await res.json();
                typing.classList.remove('show');
                addMessage(data.reply, 'ai');

                // Play audio
                if (data.has_audio && data.audio_url) {
                    if (currentAudio) { currentAudio.pause(); }
                    currentAudio = new Audio(data.audio_url);
                    currentAudio.play().catch(() => {});
                }
            } catch (err) {
                typing.classList.remove('show');
                addMessage("Sorry Aniket, I'm not well can you please check my health.", 'ai');
            }
        }

        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        // Focus input on load
        msgInput.focus();
    </script>
</body>
</html>
